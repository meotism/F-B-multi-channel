name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Supabase config
        run: |
          sed -i "s|https://gaaeyrnonbevkxpllwue.supabase.co|${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}|g" js/config.js
          sed -i "s|eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9[^']*|${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}|g" js/config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
