<!-- Reservation list page template - loaded by router -->
<section x-data="reservationPage()" x-init="init()" @beforeunload.window="destroy()" style="padding: var(--space-4); max-width: 1200px; margin: 0 auto;">

  <!-- ================================================================
       Header + Create Button
       ================================================================ -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4);">
    <h2 style="margin: 0; font-size: var(--font-size-lg);">Đặt hẹn</h2>
    <button class="btn btn--primary" @click="openCreateModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      <span>Tạo đặt hẹn</span>
    </button>
  </div>

  <!-- ================================================================
       Filter Bar
       ================================================================ -->
  <div style="display: flex; flex-wrap: wrap; gap: var(--space-3); align-items: flex-end; margin-bottom: var(--space-4);">

    <!-- Status filter -->
    <div class="form-group" style="margin-bottom: 0; min-width: 140px;">
      <label class="form-label" for="filter-res-status">Trạng thái</label>
      <select id="filter-res-status" class="form-select" x-model="filterStatus" @change="applyFilters()">
        <option value="">Tất cả</option>
        <option value="pending">Chờ đến</option>
        <option value="active">Đã đến</option>
        <option value="expired">Hết hạn</option>
        <option value="cancelled">Đã hủy</option>
        <option value="completed">Hoàn thành</option>
      </select>
    </div>

    <!-- Date from -->
    <div class="form-group" style="margin-bottom: 0; min-width: 140px;">
      <label class="form-label" for="filter-res-from">Từ ngày</label>
      <input id="filter-res-from" type="date" class="form-input"
             x-model="filterDateFrom" @change="applyFilters()">
    </div>

    <!-- Date to -->
    <div class="form-group" style="margin-bottom: 0; min-width: 140px;">
      <label class="form-label" for="filter-res-to">Đến ngày</label>
      <input id="filter-res-to" type="date" class="form-input"
             x-model="filterDateTo" @change="applyFilters()">
    </div>

    <!-- Table filter -->
    <div class="form-group" style="margin-bottom: 0; min-width: 140px;">
      <label class="form-label" for="filter-res-table">Bàn</label>
      <select id="filter-res-table" class="form-select" x-model="filterTableId" @change="applyFilters()">
        <option value="">Tất cả bàn</option>
        <template x-for="table in tables" :key="table.id">
          <option :value="table.id" x-text="table.name"></option>
        </template>
      </select>
    </div>

    <!-- Clear filters -->
    <button class="btn btn--outline btn--sm" @click="clearFilters()"
            style="height: 38px;">
      Xóa bộ lọc
    </button>
  </div>

  <!-- ================================================================
       Loading State
       ================================================================ -->
  <div x-show="isLoading" x-cloak style="text-align: center; padding: var(--space-6);">
    <div class="spinner"></div>
    <p style="margin-top: var(--space-3); color: var(--color-text-secondary);">Đang tải danh sách đặt hẹn...</p>
  </div>

  <!-- ================================================================
       Empty State
       ================================================================ -->
  <div x-show="!isLoading && reservations.length === 0" x-cloak
       style="text-align: center; padding: var(--space-8); color: var(--color-text-secondary);">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
         style="color: var(--color-text-secondary); margin-bottom: var(--space-3);">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
      <line x1="16" y1="2" x2="16" y2="6"></line>
      <line x1="8" y1="2" x2="8" y2="6"></line>
      <line x1="3" y1="10" x2="21" y2="10"></line>
    </svg>
    <p>Không có đặt hẹn nào</p>
  </div>

  <!-- ================================================================
       Desktop: Data Table
       ================================================================ -->
  <div x-show="!isLoading && reservations.length > 0" x-cloak class="data-table-wrapper hide-mobile">
    <table class="data-table">
      <thead>
        <tr>
          <th>Thời gian</th>
          <th>Khách hàng</th>
          <th>Số khách</th>
          <th>Bàn</th>
          <th>Trạng thái</th>
          <th>Thao tác</th>
        </tr>
      </thead>
      <tbody>
        <template x-for="res in reservations" :key="res.id">
          <tr>
            <td>
              <div x-text="formatTimeRange(res)" style="font-weight: 600; white-space: nowrap;"></div>
              <div style="font-size: var(--font-size-xs); color: var(--color-text-secondary);"
                   x-text="formatDuration(res.duration_hours)"></div>
            </td>
            <td>
              <div style="font-weight: 600;" x-text="res.customer_name"></div>
              <div x-show="res.customer_phone" style="font-size: var(--font-size-xs); color: var(--color-text-secondary);"
                   x-text="res.customer_phone" x-cloak></div>
            </td>
            <td x-text="res.party_size"></td>
            <td x-text="tableName(res)"></td>
            <td>
              <span class="badge" :class="statusBadgeClass(res.status)"
                    x-text="statusLabel(res.status)"></span>
              <span x-show="res.prepaid" x-cloak class="badge badge--success"
                    style="font-size: 9px; margin-left: 2px;">Trả trước</span>
            </td>
            <td>
              <div style="display: flex; gap: var(--space-1); flex-wrap: wrap;">
                <!-- Pending actions -->
                <template x-if="res.status === 'pending'">
                  <div style="display: flex; gap: var(--space-1); flex-wrap: wrap;">
                    <button class="btn btn--success btn--sm" @click="handleConfirmArrival(res)"
                            title="Xác nhận khách đến">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                      </svg>
                    </button>
                    <button class="btn btn--outline btn--sm" @click="openEditModal(res)"
                            title="Sửa">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                      </svg>
                    </button>
                    <button class="btn btn--danger btn--sm" @click="handleCancel(res)"
                            title="Hủy">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                      </svg>
                    </button>
                  </div>
                </template>
                <!-- Active: go to order -->
                <template x-if="res.status === 'active'">
                  <button class="btn btn--primary btn--sm" @click="goToOrder(res)">
                    Tạo order
                  </button>
                </template>
              </div>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>

  <!-- ================================================================
       Mobile: Card Layout
       ================================================================ -->
  <div x-show="!isLoading && reservations.length > 0" x-cloak class="show-mobile-only"
       style="display: flex; flex-direction: column; gap: var(--space-3);">
    <template x-for="res in reservations" :key="res.id">
      <div class="reservation-card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-2);">
          <span style="font-weight: 600;" x-text="res.customer_name"></span>
          <span class="badge" :class="statusBadgeClass(res.status)"
                x-text="statusLabel(res.status)"></span>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; font-size: var(--font-size-sm);">
          <span x-text="tableName(res)"></span>
          <span x-text="res.party_size + ' khách'"></span>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: var(--space-2); font-size: var(--font-size-xs); color: var(--color-text-secondary);">
          <span x-text="formatDateTime(res.reserved_at)"></span>
          <span x-text="res.customer_phone || ''"></span>
        </div>
        <!-- Notes -->
        <div x-show="res.notes" x-cloak
             style="margin-top: var(--space-2); font-size: var(--font-size-xs); color: var(--color-text-secondary); font-style: italic;"
             x-text="res.notes"></div>
        <!-- Card actions -->
        <div style="display: flex; gap: var(--space-2); margin-top: var(--space-3);">
          <template x-if="res.status === 'pending'">
            <div style="display: flex; gap: var(--space-2); width: 100%;">
              <button class="btn btn--success btn--sm" style="flex: 1;" @click="handleConfirmArrival(res)">
                Xác nhận
              </button>
              <button class="btn btn--outline btn--sm" @click="openEditModal(res)">
                Sửa
              </button>
              <button class="btn btn--danger btn--sm" @click="handleCancel(res)">
                Hủy
              </button>
            </div>
          </template>
          <template x-if="res.status === 'active'">
            <button class="btn btn--primary btn--sm" style="width: 100%;" @click="goToOrder(res)">
              Tạo order
            </button>
          </template>
        </div>
      </div>
    </template>
  </div>

  <!-- ================================================================
       Pagination Controls
       ================================================================ -->
  <div x-show="!isLoading && totalPages > 1" x-cloak
       style="display: flex; justify-content: space-between; align-items: center; margin-top: var(--space-4); padding: var(--space-3) 0; border-top: 1px solid var(--color-border);">
    <span style="font-size: var(--font-size-sm); color: var(--color-text-secondary);"
          x-text="paginationInfo"></span>
    <div style="display: flex; gap: var(--space-2); align-items: center;">
      <button class="btn btn--outline btn--sm"
              @click="prevPage()"
              :disabled="currentPage <= 1">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <span style="font-size: var(--font-size-sm); min-width: 60px; text-align: center;"
            x-text="currentPage + ' / ' + totalPages"></span>
      <button class="btn btn--outline btn--sm"
              @click="nextPage()"
              :disabled="currentPage >= totalPages">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </div>
  </div>

  <!-- ================================================================
       Create / Edit Reservation Modal
       ================================================================ -->
  <div x-show="showModal" x-cloak
       class="modal-backdrop"
       @click.self="closeModal()"
       @keydown.escape.window="showModal && closeModal()">
    <div class="modal-content" @click.stop style="max-width: 480px;">
      <!-- Header -->
      <div class="modal-content__header">
        <h3 x-text="isEditing ? 'Sửa đặt hẹn' : 'Tạo đặt hẹn'"></h3>
        <button class="modal-content__close" @click="closeModal()" aria-label="Đóng">&times;</button>
      </div>

      <!-- Body -->
      <div class="modal-content__body">
        <!-- Error -->
        <div x-show="formError" x-cloak class="form-error"
             style="margin-bottom: var(--space-4);" x-text="formError"></div>

        <!-- Customer name -->
        <div class="form-group">
          <label class="form-label" for="res-name">Tên khách <span style="color: var(--color-danger);">*</span></label>
          <input id="res-name" type="text" class="form-input"
                 x-model="form.customer_name" placeholder="VD: Nguyễn Văn A" required>
        </div>

        <!-- Phone -->
        <div class="form-group">
          <label class="form-label" for="res-phone">Số điện thoại</label>
          <input id="res-phone" type="tel" class="form-input"
                 x-model="form.customer_phone" placeholder="VD: 0912345678">
        </div>

        <!-- Party size -->
        <div class="form-group">
          <label class="form-label" for="res-party">Số khách <span style="color: var(--color-danger);">*</span></label>
          <input id="res-party" type="number" class="form-input"
                 x-model.number="form.party_size" min="1" required>
        </div>

        <!-- Table selection -->
        <div class="form-group">
          <label class="form-label" for="res-table">Chọn bàn <span style="color: var(--color-danger);">*</span></label>
          <select id="res-table" class="form-select" x-model="form.table_id" required>
            <option value="">-- Chọn bàn --</option>
            <template x-for="table in tables" :key="table.id">
              <option :value="table.id" x-text="table.name + ' (' + table.capacity + ' chỗ)'"></option>
            </template>
          </select>
        </div>

        <!-- Reserved at -->
        <div class="form-group">
          <label class="form-label" for="res-time">Thời gian đến <span style="color: var(--color-danger);">*</span></label>
          <input id="res-time" type="datetime-local" class="form-input"
                 x-model="form.reserved_at" required>
        </div>

        <!-- Duration -->
        <div class="form-group">
          <label class="form-label" for="res-duration">Thời lượng (giờ) <span style="color: var(--color-danger);">*</span></label>
          <select id="res-duration" class="form-select" x-model.number="form.duration_hours">
            <option value="0.5">0.5 giờ</option>
            <option value="1">1 giờ</option>
            <option value="1.5">1.5 giờ</option>
            <option value="2">2 giờ</option>
            <option value="3">3 giờ</option>
            <option value="4">4 giờ</option>
            <option value="5">5 giờ</option>
            <option value="6">6 giờ</option>
            <option value="8">8 giờ</option>
            <option value="10">10 giờ</option>
            <option value="12">12 giờ</option>
            <option value="24">24 giờ</option>
          </select>
        </div>

        <!-- Prepaid checkbox (only on create) -->
        <div class="form-group" x-show="!isEditing" x-cloak>
          <label style="display: flex; align-items: center; gap: var(--space-2); cursor: pointer;">
            <input type="checkbox" x-model="form.prepaid"
                   style="width: 18px; height: 18px; accent-color: var(--color-primary);">
            <span class="form-label" style="margin: 0;">Khách trả tiền trước</span>
          </label>
          <p style="margin-top: var(--space-1); font-size: var(--font-size-xs); color: var(--color-text-secondary);">
            Nếu tick, đặt hẹn sẽ được xác nhận ngay và tạo đơn tự động.
          </p>
          <!-- Prepaid price preview -->
          <div x-show="form.prepaid && form.table_id && getPrepaidPrice() > 0" x-cloak
               style="margin-top: var(--space-2); padding: var(--space-2) var(--space-3); background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md);">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <span style="font-size: var(--font-size-sm); color: var(--color-text-secondary);">Phí theo giờ:</span>
              <span style="font-size: var(--font-size-sm);"
                    x-text="formatVND(getSelectedTableRate()) + '/h &times; ' + form.duration_hours + 'h'"></span>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: var(--space-1); font-weight: 700; font-size: var(--font-size-base); color: var(--color-primary);">
              <span>Tổng cộc:</span>
              <span x-text="formatVND(getPrepaidPrice()) + 'đ'"></span>
            </div>
          </div>
        </div>

        <!-- Notes -->
        <div class="form-group">
          <label class="form-label" for="res-notes">Ghi chú</label>
          <textarea id="res-notes" class="form-input" rows="2"
                    x-model="form.notes" placeholder="VD: Bàn ngoài sân, sinh nhật..."></textarea>
        </div>
      </div>

      <!-- Footer -->
      <div class="modal-content__footer">
        <button class="btn btn--outline" @click="closeModal()">Hủy</button>
        <button class="btn btn--primary" @click="submitForm()" :disabled="isSaving">
          <span x-show="isSaving" class="spinner spinner--sm" style="color: white;" x-cloak></span>
          <span x-text="isSaving ? 'Đang lưu...' : (isEditing ? 'Cập nhật' : 'Tạo đặt hẹn')"></span>
        </button>
      </div>
    </div>
  </div>

</section>
