<!-- Inventory dashboard page template - loaded by router -->
<section x-data="inventoryPage()">
  <div class="page-header">
    <h2>Ton kho</h2>
    <a href="#/ingredients" class="btn btn--outline">
      Quan ly nguyen lieu
    </a>
  </div>

  <div class="page-content">

    <!-- Task 12.1: Low stock alert banner -->
    <div x-show="lowStockItems.length > 0"
         x-cloak
         class="inventory-alert-banner"
         style="background: var(--color-danger-bg, #fef2f2); border: 1px solid var(--color-danger, #dc2626); border-radius: var(--radius-md, 8px); padding: var(--space-3); margin-bottom: var(--space-3);">
      <div style="display: flex; align-items: center; gap: var(--space-2); margin-bottom: var(--space-2);">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--color-danger, #dc2626)"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
          <line x1="12" y1="9" x2="12" y2="13"></line>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
        <strong style="color: var(--color-danger, #dc2626);">
          Canh bao: <span x-text="lowStockItems.length"></span> nguyen lieu sap het hang
        </strong>
      </div>
      <div style="display: flex; flex-wrap: wrap; gap: var(--space-1);">
        <template x-for="lsi in lowStockItems" :key="lsi.id">
          <span class="badge badge--danger" x-text="(lsi.ingredients?.name || '---') + ' (' + formatQty(lsi.qty_on_hand) + ')'"></span>
        </template>
      </div>
    </div>

    <!-- Summary cards -->
    <div class="inventory-summary">
      <div class="inventory-summary__card">
        <span class="inventory-summary__label">Tong nguyen lieu</span>
        <span class="inventory-summary__value" x-text="totalCount"></span>
      </div>
      <div class="inventory-summary__card inventory-summary__card--warning"
           x-show="lowStockCount > 0">
        <span class="inventory-summary__label">Sap het hang</span>
        <span class="inventory-summary__value">
          <span x-text="lowStockCount"></span>
          <span class="badge badge--danger">Canh bao</span>
        </span>
      </div>
    </div>

    <!-- Search and sort controls -->
    <div class="inventory-controls">
      <div class="inventory-controls__search">
        <input type="text"
               class="form-input"
               placeholder="Tim kiem nguyen lieu..."
               x-model="searchQuery"
               @input.debounce.300ms="$nextTick()">
      </div>
      <div class="inventory-controls__sort">
        <button class="btn btn--outline btn--sm"
                :class="{ 'btn--primary': sortBy === 'name' }"
                @click="toggleSort('name')">
          Ten
          <span x-show="sortBy === 'name'" x-text="sortDir === 'asc' ? '&uarr;' : '&darr;'"></span>
        </button>
        <button class="btn btn--outline btn--sm"
                :class="{ 'btn--primary': sortBy === 'qty_on_hand' }"
                @click="toggleSort('qty_on_hand')">
          Ton kho
          <span x-show="sortBy === 'qty_on_hand'" x-text="sortDir === 'asc' ? '&uarr;' : '&darr;'"></span>
        </button>
        <button class="btn btn--outline btn--sm"
                :class="{ 'btn--primary': sortBy === 'alert' }"
                @click="toggleSort('alert')">
          Trang thai
          <span x-show="sortBy === 'alert'" x-text="sortDir === 'asc' ? '&uarr;' : '&darr;'"></span>
        </button>
      </div>
    </div>

    <!-- Loading skeleton -->
    <template x-if="isLoading">
      <div class="inventory-skeleton">
        <div class="skeleton skeleton--row" style="height: 48px;"></div>
        <div class="skeleton skeleton--row" style="height: 48px;"></div>
        <div class="skeleton skeleton--row" style="height: 48px;"></div>
        <div class="skeleton skeleton--row" style="height: 48px;"></div>
        <div class="skeleton skeleton--row" style="height: 48px;"></div>
      </div>
    </template>

    <!-- Empty state -->
    <template x-if="!isLoading && inventoryItems.length === 0">
      <div class="empty-state">
        <svg class="empty-state__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
          <line x1="12" y1="22.08" x2="12" y2="12"></line>
        </svg>
        <p class="empty-state__text">Chua co du lieu ton kho</p>
        <a href="#/ingredients" class="btn btn--primary">
          Them nguyen lieu
        </a>
      </div>
    </template>

    <!-- No search results -->
    <template x-if="!isLoading && inventoryItems.length > 0 && filteredItems.length === 0">
      <div class="empty-state">
        <p class="empty-state__text">Khong tim thay nguyen lieu phu hop</p>
      </div>
    </template>

    <!-- Inventory table (desktop) -->
    <template x-if="!isLoading && filteredItems.length > 0">
      <div>
        <!-- Desktop table view -->
        <div class="data-table-wrapper inventory-table-desktop">
          <table class="data-table">
            <thead>
              <tr>
                <th>Ten nguyen lieu</th>
                <th>Don vi</th>
                <th>Ton kho</th>
                <th>Nguong canh bao</th>
                <th>Trang thai</th>
                <th>Cap nhat luc</th>
                <th class="data-table__actions-col">Thao tac</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="item in filteredItems" :key="item.id">
                <tr :class="{ 'inventory-row--low-stock': item.qty_on_hand <= item.threshold }">
                  <td x-text="item.ingredients?.name || '---'"></td>
                  <td>
                    <span class="badge badge--muted" x-text="item.ingredients?.unit || '---'"></span>
                  </td>
                  <td>
                    <span class="inventory-qty"
                          :class="{ 'inventory-qty--low': item.qty_on_hand <= item.threshold }"
                          x-text="formatQty(item.qty_on_hand)"></span>
                  </td>
                  <td x-text="formatQty(item.threshold)"></td>
                  <td>
                    <span class="badge"
                          :class="item.qty_on_hand <= item.threshold ? 'badge--danger' : 'badge--success'"
                          x-text="item.qty_on_hand <= item.threshold ? 'Sap het' : 'Binh thuong'"></span>
                  </td>
                  <td x-text="formatDate(item.updated_at)"></td>
                  <td class="data-table__actions" style="display: flex; gap: var(--space-1); flex-wrap: wrap;">
                    <button class="btn btn--primary btn--sm"
                            @click="openUpdateModal(item)">
                      Cap nhat
                    </button>
                    <!-- Task 12.1: Stock-in button -->
                    <button class="btn btn--success btn--sm"
                            @click="openStockInModal(item)">
                      Nhap kho
                    </button>
                    <!-- Task 12.2: History toggle -->
                    <button class="btn btn--outline btn--sm"
                            @click="toggleMovementHistory(item)"
                            :class="{ 'btn--secondary': expandedItemId === item.id }">
                      Lich su
                    </button>
                  </td>
                </tr>
                <!-- Task 12.2: Expandable stock movement history row -->
                <template x-if="expandedItemId === item.id">
                  <tr>
                    <td colspan="7" style="padding: var(--space-2) var(--space-3); background: var(--color-surface, #f9fafb);">
                      <div x-show="isLoadingMovements" style="text-align: center; padding: var(--space-2);">
                        <span class="spinner spinner--sm"></span>
                      </div>
                      <div x-show="!isLoadingMovements && stockMovements.length === 0" x-cloak style="text-align: center; padding: var(--space-2); color: var(--color-text-secondary);">
                        Chua co lich su xuat nhap kho
                      </div>
                      <table x-show="!isLoadingMovements && stockMovements.length > 0" x-cloak class="data-table" style="margin: 0;">
                        <thead>
                          <tr>
                            <th>Loai</th>
                            <th>So luong</th>
                            <th>Ghi chu</th>
                            <th>Thoi gian</th>
                          </tr>
                        </thead>
                        <tbody>
                          <template x-for="mv in stockMovements" :key="mv.id">
                            <tr>
                              <td>
                                <span class="badge"
                                      :class="mv.type === 'in' ? 'badge--success' : (mv.type === 'out' ? 'badge--danger' : 'badge--muted')"
                                      x-text="formatMovementType(mv.type)"></span>
                              </td>
                              <td x-text="formatQty(mv.qty)"></td>
                              <td x-text="mv.note || '---'"></td>
                              <td x-text="formatDate(mv.created_at)"></td>
                            </tr>
                          </template>
                        </tbody>
                      </table>
                    </td>
                  </tr>
                </template>
              </template>
            </tbody>
          </table>
        </div>

        <!-- Mobile card view -->
        <div class="inventory-cards-mobile">
          <template x-for="item in filteredItems" :key="item.id">
            <div class="inventory-card"
                 :class="{ 'inventory-card--low-stock': item.qty_on_hand <= item.threshold }">
              <div class="inventory-card__header">
                <span class="inventory-card__name" x-text="item.ingredients?.name || '---'"></span>
                <span class="badge"
                      :class="item.qty_on_hand <= item.threshold ? 'badge--danger' : 'badge--success'"
                      x-text="item.qty_on_hand <= item.threshold ? 'Sap het' : 'Binh thuong'"></span>
              </div>
              <div class="inventory-card__details">
                <div class="inventory-card__row">
                  <span class="inventory-card__label">Don vi:</span>
                  <span class="badge badge--muted" x-text="item.ingredients?.unit || '---'"></span>
                </div>
                <div class="inventory-card__row">
                  <span class="inventory-card__label">Ton kho:</span>
                  <span class="inventory-qty"
                        :class="{ 'inventory-qty--low': item.qty_on_hand <= item.threshold }"
                        x-text="formatQty(item.qty_on_hand)"></span>
                </div>
                <div class="inventory-card__row">
                  <span class="inventory-card__label">Nguong:</span>
                  <span x-text="formatQty(item.threshold)"></span>
                </div>
                <div class="inventory-card__row">
                  <span class="inventory-card__label">Cap nhat:</span>
                  <span class="inventory-card__date" x-text="formatDate(item.updated_at)"></span>
                </div>
              </div>
              <div class="inventory-card__actions" style="display: flex; gap: var(--space-1); flex-wrap: wrap;">
                <button class="btn btn--primary btn--sm"
                        @click="openUpdateModal(item)">
                  Cap nhat
                </button>
                <!-- Task 12.1: Stock-in button (mobile) -->
                <button class="btn btn--success btn--sm"
                        @click="openStockInModal(item)">
                  Nhap kho
                </button>
                <!-- Task 12.2: History toggle (mobile) -->
                <button class="btn btn--outline btn--sm"
                        @click="toggleMovementHistory(item)"
                        :class="{ 'btn--secondary': expandedItemId === item.id }">
                  Lich su
                </button>
              </div>
              <!-- Task 12.2: Expandable stock movement history (mobile) -->
              <template x-if="expandedItemId === item.id">
                <div style="margin-top: var(--space-2); padding: var(--space-2); background: var(--color-surface, #f9fafb); border-radius: var(--radius-md, 8px);">
                  <div x-show="isLoadingMovements" style="text-align: center; padding: var(--space-2);">
                    <span class="spinner spinner--sm"></span>
                  </div>
                  <div x-show="!isLoadingMovements && stockMovements.length === 0" x-cloak style="text-align: center; color: var(--color-text-secondary); font-size: var(--font-size-sm);">
                    Chua co lich su
                  </div>
                  <template x-for="mv in stockMovements" :key="mv.id">
                    <div x-show="!isLoadingMovements" x-cloak style="display: flex; justify-content: space-between; align-items: center; padding: var(--space-1) 0; border-bottom: 1px solid var(--color-border, #e5e7eb); font-size: var(--font-size-sm);">
                      <span class="badge"
                            :class="mv.type === 'in' ? 'badge--success' : (mv.type === 'out' ? 'badge--danger' : 'badge--muted')"
                            x-text="formatMovementType(mv.type)"></span>
                      <span x-text="formatQty(mv.qty)"></span>
                      <span style="color: var(--color-text-secondary); font-size: var(--font-size-xs);" x-text="formatDate(mv.created_at)"></span>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>
        </div>
      </div>
    </template>
  </div>

  <!-- ===============================================================
       Stock Update Modal
       =============================================================== -->
  <div class="modal-backdrop"
       x-show="showUpdateModal"
       x-transition.opacity
       @click.self="closeUpdateModal()"
       x-cloak>
    <div class="modal-content" x-show="showUpdateModal" x-transition>
      <div class="modal-content__header">
        <h3>Cap nhat ton kho</h3>
        <button class="modal-content__close"
                @click="closeUpdateModal()"
                aria-label="Dong">&times;</button>
      </div>

      <form @submit.prevent="submitUpdate()">
        <div class="modal-content__body">
          <!-- Error message -->
          <div class="form-error" x-show="updateError" x-text="updateError" x-cloak></div>

          <!-- Ingredient name display -->
          <div class="form-group">
            <label class="form-label">Nguyen lieu</label>
            <p class="inventory-modal__ingredient-name"
               x-text="updatingItem?.ingredients?.name || ''"></p>
          </div>

          <!-- Current stock display -->
          <div class="form-group">
            <label class="form-label">Ton kho hien tai</label>
            <p class="inventory-modal__current-qty"
               x-text="updatingItem ? formatQty(updatingItem.qty_on_hand) + ' ' + (updatingItem.ingredients?.unit || '') : ''"></p>
          </div>

          <!-- New quantity input -->
          <div class="form-group">
            <label class="form-label" for="new-qty">So luong moi *</label>
            <input type="number"
                   id="new-qty"
                   class="form-input"
                   x-model.number="newQty"
                   step="0.001"
                   min="0"
                   placeholder="Nhap so luong moi..."
                   required>
            <p class="form-hint" x-text="updatingItem ? 'Don vi: ' + (updatingItem.ingredients?.unit || '') : ''"></p>
          </div>
        </div>

        <div class="modal-content__footer">
          <button type="button"
                  class="btn btn--outline"
                  @click="closeUpdateModal()">
            Huy
          </button>
          <button type="submit"
                  class="btn btn--primary"
                  :disabled="isSaving">
            <span x-show="!isSaving">Cap nhat</span>
            <span x-show="isSaving" class="spinner spinner--sm"></span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===============================================================
       Task 12.1: Stock-In Modal
       =============================================================== -->
  <div class="modal-backdrop"
       x-show="showStockInModal"
       x-transition.opacity
       @click.self="closeStockInModal()"
       x-cloak>
    <div class="modal-content" x-show="showStockInModal" x-transition>
      <div class="modal-content__header">
        <h3>Nhap kho</h3>
        <button class="modal-content__close"
                @click="closeStockInModal()"
                aria-label="Dong">&times;</button>
      </div>

      <form @submit.prevent="submitStockIn()">
        <div class="modal-content__body">
          <!-- Error message -->
          <div class="form-error" x-show="stockInError" x-text="stockInError" x-cloak></div>

          <!-- Ingredient name -->
          <div class="form-group">
            <label class="form-label">Nguyen lieu</label>
            <p style="font-weight: 600;"
               x-text="stockInItem?.ingredients?.name || ''"></p>
          </div>

          <!-- Current stock display -->
          <div class="form-group">
            <label class="form-label">Ton kho hien tai</label>
            <p x-text="stockInItem ? formatQty(stockInItem.qty_on_hand) + ' ' + (stockInItem.ingredients?.unit || '') : ''"></p>
          </div>

          <!-- Quantity to add -->
          <div class="form-group">
            <label class="form-label" for="stock-in-qty">So luong nhap *</label>
            <input type="number"
                   id="stock-in-qty"
                   class="form-input"
                   x-model.number="stockInQty"
                   step="0.001"
                   min="0.001"
                   placeholder="Nhap so luong..."
                   required>
            <p class="form-hint" x-text="stockInItem ? 'Don vi: ' + (stockInItem.ingredients?.unit || '') : ''"></p>
          </div>

          <!-- Supplier note -->
          <div class="form-group">
            <label class="form-label" for="stock-in-note">Ghi chu (nha cung cap, so PO...)</label>
            <input type="text"
                   id="stock-in-note"
                   class="form-input"
                   x-model="stockInNote"
                   placeholder="Ghi chu..."
                   maxlength="500">
          </div>
        </div>

        <div class="modal-content__footer">
          <button type="button"
                  class="btn btn--outline"
                  @click="closeStockInModal()">
            Huy
          </button>
          <button type="submit"
                  class="btn btn--success"
                  :disabled="isStockingIn">
            <span x-show="!isStockingIn">Nhap kho</span>
            <span x-show="isStockingIn" class="spinner spinner--sm"></span>
          </button>
        </div>
      </form>
    </div>
  </div>
</section>
