<!-- Table map page template - loaded by router -->
<section x-data="tableMapPage()" x-init="init()" @beforeunload.window="destroy()">

  <!-- ================================================================
       Map Toolbar
       ================================================================ -->
  <div class="map-toolbar">
    <!-- View mode toolbar -->
    <template x-if="!isEditMode">
      <div class="map-toolbar__view-actions">
        <button class="btn btn--primary"
                @click="enterEditMode()"
                x-show="$store.auth.canEditMap()"
                :disabled="!!lockOwner">
          <!-- Edit icon -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
          </svg>
          <span>Chỉnh sửa sơ đồ</span>
        </button>
      </div>
    </template>

    <!-- Edit mode toolbar -->
    <template x-if="isEditMode">
      <div class="map-toolbar__edit-actions">
        <button class="btn btn--success"
                @click="saveMap()"
                :disabled="isSaving || !$store.tableMap.hasUnsavedChanges">
          <!-- Spinner shown during save -->
          <span x-show="isSaving" class="spinner spinner--sm" style="color: white;" x-cloak></span>
          <!-- Save icon (hidden during save) -->
          <svg x-show="!isSaving" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
            <polyline points="17 21 17 13 7 13 7 21"></polyline>
            <polyline points="7 3 7 8 15 8"></polyline>
          </svg>
          <span x-text="isSaving ? 'Đang lưu...' : 'Lưu sơ đồ'"></span>
        </button>
        <button class="btn btn--outline" @click="undo()" :disabled="undoStack.length === 0">
          <!-- Undo icon -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"></polyline>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
          </svg>
          <span>Hoàn tác</span>
        </button>
        <button class="btn btn--outline" @click="openAddModal()">
          <!-- Plus icon -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          <span>Thêm bàn</span>
        </button>
        <button class="btn btn--danger" @click="handleExitEditMode()">
          <!-- X icon -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
          <span>Thoát chỉnh sửa</span>
        </button>
      </div>
    </template>

    <!-- Lock indicator: shown when another user is editing -->
    <div x-show="lockOwner && !isEditMode"
         x-cloak
         class="map-lock-indicator">
      <!-- Lock icon -->
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
      <span x-text="lockOwner?.user_name + ' đang chỉnh sửa sơ đồ bàn'"></span>
    </div>
  </div>

  <!-- ================================================================
       Map Container
       ================================================================ -->
  <div id="map-container"
       class="map-container"
       :class="{ 'map-container--edit': isEditMode }">

    <!-- Task 19.1: Skeleton loading grid shown while tables are loading -->
    <div x-show="$store.tableMap.isLoading" x-cloak
         style="display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: var(--space-3); padding: var(--space-6); width: 100%;">
      <template x-for="i in 12" :key="i">
        <div class="skeleton skeleton--rect"
             style="height: 80px; border-radius: var(--radius-md);"></div>
      </template>
    </div>

    <!-- Empty state when no tables exist -->
    <div x-show="!$store.tableMap.isLoading && tables.length === 0"
         x-cloak
         class="map-empty-state">
      <!-- Grid/map icon -->
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
           style="color: var(--color-text-secondary); margin-bottom: var(--space-3);">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
      </svg>
      <p>Chưa có bàn nào trên sơ đồ</p>
    </div>

    <!-- Table nodes rendered from store data (hidden while loading) -->
    <template x-if="!$store.tableMap.isLoading">
    <div>
    <template x-for="table in tables" :key="table.id">
      <div class="table-node"
           :class="[
             'table-node--' + table.status,
             'table-node--' + table.shape,
             { 'is-editable': isEditMode, 'is-selected': selectedTable?.id === table.id }
           ]"
           :style="`left: ${table.x}%; top: ${table.y}%; transform: rotate(${table.rotation || 0}deg);`"
           :data-table-id="table.id"
           :data-capacity="table.capacity"
           :data-status="table.status"
           @click="handleTableClick(table)"
           @contextmenu="showContextMenu($event, table)"
           @touchstart="startLongPress($event, table)"
           @touchend="cancelLongPress()"
           @touchmove="cancelLongPress()"
           @pointerdown="isEditMode && startDrag($event, table)"
           @dragstart.prevent>

        <!-- Color-blind status icon (Task 8.3) -->
        <span class="table-node__status-icon" aria-hidden="true"
              x-text="{'empty':'\u2713','serving':'\u23F1','awaiting_payment':'\uD83D\uDD14','paid':'\uD83D\uDCB5'}[table.status] || ''"></span>

        <!-- Table name: double-click to inline rename in edit mode -->
        <span class="table-node__name"
              x-show="!(isEditMode && inlineRenameTableId === table.id)"
              x-text="table.name"
              @dblclick.stop="startInlineRename(table)"></span>
        <!-- Inline rename input: shown on double-click -->
        <input x-show="isEditMode && inlineRenameTableId === table.id"
               x-cloak
               type="text"
               class="table-node__rename-input"
               x-model="inlineRenameValue"
               @keydown.enter.stop="confirmInlineRename()"
               @keydown.escape.stop="cancelInlineRename()"
               @blur="confirmInlineRename()"
               @click.stop>
        <span class="table-node__code" x-text="table.table_code"></span>
        <span class="table-node__seats" x-text="table.capacity + ' chỗ'"></span>
        <!-- Hourly rate indicator (billiard tables) -->
        <span class="table-node__rate"
              x-show="table.hourly_rate > 0"
              x-text="formatVND(table.hourly_rate) + '/h'"
              x-cloak></span>
        <!-- Timer for serving tables -->
        <span class="table-node__timer"
              x-show="table.status === 'serving'"
              x-text="getElapsedTime(table.activeOrderStartedAt)"
              x-cloak>
        </span>

        <!-- Guest count + order total overlay (Task 8.2) -->
        <div class="table-node__info"
             x-show="table.status === 'serving' || table.status === 'awaiting_payment'"
             x-cloak>
          <span x-show="table.guest_count > 0"
                x-text="table.guest_count + ' kh\u00E1ch'"></span>
          <span x-show="table.order_total > 0"
                x-text="formatVND(table.order_total) + '\u0111'"></span>
          <!-- Running hourly charge for billiard tables -->
          <span x-show="table.hourly_rate > 0 && table.status === 'serving'"
                class="table-node__hourly-cost"
                x-text="'\u23F1 ' + formatVND(getRunningHourlyCharge(table)) + '\u0111'"
                x-cloak></span>
        </div>
      </div>
    </template>
    </div>
    </template>
  </div>

  <!-- ================================================================
       Selected Table Details Panel
       Desktop: sidebar panel (visible in edit mode when a table is selected)
       Tablet/Mobile: collapsible bottom sheet (visible on table tap)
       ================================================================ -->
  <div x-show="selectedTable"
       x-cloak
       class="map-selected-panel"
       :class="{ 'is-collapsed': isDetailsPanelCollapsed }"
       @click="isDetailsPanelCollapsed = false">
    <!-- Drag handle for bottom sheet (visible on tablet/mobile only via CSS) -->
    <div class="map-selected-panel__drag-handle"
         @click.stop="isDetailsPanelCollapsed = !isDetailsPanelCollapsed"
         aria-label="Thu gọn/mở rộng chi tiết bàn"></div>
    <h3 class="map-selected-panel__title" x-text="selectedTable?.name"></h3>
    <dl class="map-selected-panel__details">
      <dt>Mã bàn</dt>
      <dd x-text="selectedTable?.table_code"></dd>
      <dt>Số chỗ</dt>
      <dd x-text="selectedTable?.capacity"></dd>
      <dt>Trạng thái</dt>
      <dd x-text="selectedTable?.status"></dd>
      <template x-if="selectedTable?.hourly_rate > 0">
        <div>
          <dt>Giá/giờ</dt>
          <dd x-text="formatVND(selectedTable.hourly_rate) + ' VND/h'"></dd>
        </div>
      </template>
      <dt>Vị trí</dt>
      <dd x-text="selectedTable ? ('X: ' + Math.round(selectedTable.x) + '% / Y: ' + Math.round(selectedTable.y) + '%') : ''"></dd>
    </dl>
    <!-- Edit button: visible only in edit mode when a table is selected -->
    <div x-show="isEditMode && selectedTable"
         x-cloak
         class="map-selected-panel__actions">
      <button class="btn btn--primary btn--sm"
              @click="openEditModal()">
        <!-- Edit/pencil icon -->
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        <span>Sửa</span>
      </button>
      <button class="btn btn--danger btn--sm"
              @click="confirmDeleteTable()">
        <!-- Trash icon -->
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <line x1="10" y1="11" x2="10" y2="17"></line>
          <line x1="14" y1="11" x2="14" y2="17"></line>
        </svg>
        <span>Xóa bàn</span>
      </button>
    </div>
  </div>

  <!-- ================================================================
       Add Table Modal
       Controlled by showAddModal state. Visible only in edit mode.
       ================================================================ -->
  <div x-show="showAddModal"
       x-cloak
       class="modal-backdrop"
       @click.self="closeAddModal()"
       @keydown.escape.window="closeAddModal()">
    <div class="modal-content" @click.stop>
      <!-- Header -->
      <div class="modal-content__header">
        <h3>Thêm bàn mới</h3>
        <button class="modal-content__close"
                @click="closeAddModal()"
                aria-label="Đóng">&times;</button>
      </div>

      <!-- Body: Form fields -->
      <div class="modal-content__body">
        <!-- Error message -->
        <div x-show="addFormError"
             x-cloak
             class="form-error"
             style="margin-bottom: var(--space-4);"
             x-text="addFormError"></div>

        <!-- Table name -->
        <div class="form-group">
          <label class="form-label" for="add-table-name">Tên bàn <span style="color: var(--color-danger);">*</span></label>
          <input id="add-table-name"
                 type="text"
                 class="form-input"
                 x-model="addForm.name"
                 placeholder="VD: Bàn 1"
                 required>
        </div>

        <!-- Table code -->
        <div class="form-group">
          <label class="form-label" for="add-table-code">Mã bàn <span style="color: var(--color-danger);">*</span></label>
          <input id="add-table-code"
                 type="text"
                 class="form-input"
                 x-model="addForm.table_code"
                 placeholder="VD: B01"
                 required>
        </div>

        <!-- Capacity -->
        <div class="form-group">
          <label class="form-label" for="add-table-capacity">Số chỗ <span style="color: var(--color-danger);">*</span></label>
          <input id="add-table-capacity"
                 type="number"
                 class="form-input"
                 x-model.number="addForm.capacity"
                 min="1"
                 required>
        </div>

        <!-- Shape -->
        <div class="form-group">
          <label class="form-label" for="add-table-shape">Hình dạng</label>
          <select id="add-table-shape"
                  class="form-select"
                  x-model="addForm.shape">
            <option value="square">Vuông</option>
            <option value="round">Tròn</option>
            <option value="rectangle">Chữ nhật</option>
          </select>
        </div>

        <!-- Hourly rate (optional, for billiard/pool tables) -->
        <div class="form-group">
          <label class="form-label" for="add-table-hourly-rate">Giá theo giờ (VND/h)</label>
          <input id="add-table-hourly-rate"
                 type="number"
                 class="form-input"
                 x-model.number="addForm.hourly_rate"
                 min="0"
                 step="1000"
                 placeholder="0 = không tính giờ">
        </div>
      </div>

      <!-- Footer: Action buttons -->
      <div class="modal-content__footer">
        <button class="btn btn--outline" @click="closeAddModal()">Hủy</button>
        <button class="btn btn--primary" @click="submitAddTable()">Thêm bàn</button>
      </div>
    </div>
  </div>

  <!-- ================================================================
       Edit Table Modal
       Controlled by showEditModal state. Visible only in edit mode.
       Pre-filled with the selected table's current values.
       ================================================================ -->
  <div x-show="showEditModal"
       x-cloak
       class="modal-backdrop"
       @click.self="closeEditModal()"
       @keydown.escape.window="showEditModal && closeEditModal()">
    <div class="modal-content" @click.stop>
      <!-- Header -->
      <div class="modal-content__header">
        <h3>Chỉnh sửa bàn</h3>
        <button class="modal-content__close"
                @click="closeEditModal()"
                aria-label="Đóng">&times;</button>
      </div>

      <!-- Body: Form fields -->
      <div class="modal-content__body">
        <!-- Error message -->
        <div x-show="editFormError"
             x-cloak
             class="form-error"
             style="margin-bottom: var(--space-4);"
             x-text="editFormError"></div>

        <!-- Table name -->
        <div class="form-group">
          <label class="form-label" for="edit-table-name">Tên bàn <span style="color: var(--color-danger);">*</span></label>
          <input id="edit-table-name"
                 type="text"
                 class="form-input"
                 x-model="editForm.name"
                 placeholder="VD: Bàn 1"
                 required>
        </div>

        <!-- Table code -->
        <div class="form-group">
          <label class="form-label" for="edit-table-code">Mã bàn <span style="color: var(--color-danger);">*</span></label>
          <input id="edit-table-code"
                 type="text"
                 class="form-input"
                 x-model="editForm.table_code"
                 placeholder="VD: B01"
                 required>
        </div>

        <!-- Capacity -->
        <div class="form-group">
          <label class="form-label" for="edit-table-capacity">Số chỗ <span style="color: var(--color-danger);">*</span></label>
          <input id="edit-table-capacity"
                 type="number"
                 class="form-input"
                 x-model.number="editForm.capacity"
                 min="1"
                 required>
        </div>

        <!-- Shape -->
        <div class="form-group">
          <label class="form-label" for="edit-table-shape">Hình dạng</label>
          <select id="edit-table-shape"
                  class="form-select"
                  x-model="editForm.shape">
            <option value="square">Vuông</option>
            <option value="round">Tròn</option>
            <option value="rectangle">Chữ nhật</option>
          </select>
        </div>

        <!-- Hourly rate (optional, for billiard/pool tables) -->
        <div class="form-group">
          <label class="form-label" for="edit-table-hourly-rate">Giá theo giờ (VND/h)</label>
          <input id="edit-table-hourly-rate"
                 type="number"
                 class="form-input"
                 x-model.number="editForm.hourly_rate"
                 min="0"
                 step="1000"
                 placeholder="0 = không tính giờ">
        </div>
      </div>

      <!-- Footer: Action buttons -->
      <div class="modal-content__footer">
        <button class="btn btn--outline" @click="closeEditModal()">Hủy</button>
        <button class="btn btn--primary" @click="submitEditTable()">Lưu thay đổi</button>
      </div>
    </div>
  </div>

  <!-- ================================================================
       Delete Table Confirmation Modal
       Controlled by showDeleteModal state. Visible only in edit mode
       when user clicks "Xóa bàn" on a selected table.
       ================================================================ -->
  <div x-show="showDeleteModal"
       x-cloak
       class="modal-backdrop"
       @click.self="closeDeleteModal()"
       @keydown.escape.window="showDeleteModal && closeDeleteModal()">
    <div class="modal-content" @click.stop>
      <!-- Header -->
      <div class="modal-content__header">
        <h3>Xác nhận xóa bàn</h3>
        <button class="modal-content__close"
                @click="closeDeleteModal()"
                aria-label="Đóng">&times;</button>
      </div>

      <!-- Body: Confirmation message -->
      <div class="modal-content__body">
        <p x-text="'Bạn có chắc muốn xóa bàn ' + (selectedTable?.name || '') + '?'"></p>
      </div>

      <!-- Footer: Action buttons -->
      <div class="modal-content__footer">
        <button class="btn btn--outline" @click="closeDeleteModal()">Hủy</button>
        <button class="btn btn--danger" @click="submitDeleteTable()">Xóa bàn</button>
      </div>
    </div>
  </div>

  <!-- ================================================================
       Context Menu (Task 8.1)
       Positioned absolutely at mouse/touch coordinates.
       Menu items change based on table status.
       ================================================================ -->
  <div x-show="contextMenu.show"
       x-cloak
       class="context-menu"
       :style="`left: ${contextMenu.x}px; top: ${contextMenu.y}px;`"
       @click.stop>

    <!-- empty status -->
    <template x-if="contextMenu.table?.status === 'empty'">
      <button class="context-menu__item"
              @click="handleContextAction('create-order', contextMenu.table)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        <span>T&#7841;o order</span>
      </button>
    </template>

    <!-- serving status -->
    <template x-if="contextMenu.table?.status === 'serving'">
      <div>
        <button class="context-menu__item"
                @click="handleContextAction('view-order', contextMenu.table)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <span>Xem order</span>
        </button>
        <div class="context-menu__divider"></div>
        <button class="context-menu__item"
                @click="handleContextAction('transfer-table', contextMenu.table)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 3 21 3 21 9"></polyline>
            <path d="M21 3l-7 7"></path>
            <polyline points="9 21 3 21 3 15"></polyline>
            <path d="M3 21l7-7"></path>
          </svg>
          <span>Chuy&#7875;n b&#224;n</span>
        </button>
        <button class="context-menu__item"
                @click="handleContextAction('merge-table', contextMenu.table)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="8" y="14" width="8" height="7"></rect>
          </svg>
          <span>G&#7897;p b&#224;n</span>
        </button>
      </div>
    </template>

    <!-- awaiting_payment status -->
    <template x-if="contextMenu.table?.status === 'awaiting_payment'">
      <div>
        <button class="context-menu__item"
                @click="handleContextAction('pay', contextMenu.table)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"></line>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
          </svg>
          <span>Thanh to&#225;n</span>
        </button>
        <div class="context-menu__divider"></div>
        <button class="context-menu__item context-menu__item--danger"
                @click="handleContextAction('cancel-payment', contextMenu.table)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="15" y1="9" x2="9" y2="15"></line>
            <line x1="9" y1="9" x2="15" y2="15"></line>
          </svg>
          <span>H&#7911;y y&#234;u c&#7847;u</span>
        </button>
      </div>
    </template>

    <!-- paid status -->
    <template x-if="contextMenu.table?.status === 'paid'">
      <button class="context-menu__item"
              @click="handleContextAction('reset', contextMenu.table)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"></polyline>
          <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
        </svg>
        <span>Reset b&#224;n</span>
      </button>
    </template>
  </div>

  <!-- ================================================================
       Task 18.1: Transfer Table Modal with Mini Table Map
       ================================================================ -->
  <div class="modal-backdrop" x-show="showTransferTableModal" x-cloak
       @click.self="showTransferTableModal = false; transferSourceTable = null;">
    <div class="modal-content" style="max-width: 600px;">
      <h3 class="modal-content__title">Chuyển bàn</h3>
      <p style="margin-bottom: var(--space-3); font-size: var(--font-size-sm); color: var(--color-text-secondary);">
        Chọn bàn trống để chuyển đơn hàng từ
        <strong x-text="transferSourceTable?.name || ''"></strong>:
      </p>

      <!-- Mini table grid -->
      <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: var(--space-2); max-height: 350px; overflow-y: auto; padding: var(--space-2);">
        <template x-for="t in $store.tableMap.tables" :key="t.id">
          <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; padding: var(--space-2); border-radius: var(--radius-md); text-align: center; min-height: 64px; font-size: var(--font-size-xs); transition: all 0.15s; position: relative;"
               :style="t.id === transferSourceTable?.id
                 ? 'background: var(--color-primary); color: white; border: 2px solid var(--color-primary); cursor: default; box-shadow: 0 0 0 3px rgba(37,99,235,0.3);'
                 : t.status === 'empty'
                   ? (transferTargetTableId === t.id
                     ? 'background: #dcfce7; border: 2px solid #16a34a; cursor: pointer;'
                     : 'background: var(--color-empty); color: white; border: 2px solid transparent; cursor: pointer;')
                   : 'background: ' + ({'serving':'var(--color-serving)','awaiting_payment':'var(--color-awaiting-payment)','paid':'var(--color-paid)'}[t.status] || '#94a3b8') + '; color: white; border: 2px solid transparent; opacity: 0.5; cursor: not-allowed;'"
               @click="t.status === 'empty' && t.id !== transferSourceTable?.id && selectTransferTarget(t)">
            <span style="font-weight: 700; font-size: var(--font-size-sm);" x-text="t.name"></span>
            <span style="opacity: 0.8;" x-text="t.table_code || ''"></span>
            <span x-show="t.id === transferSourceTable?.id"
                  style="font-size: 10px; opacity: 0.9;">
              (nguồn)
            </span>
          </div>
        </template>
      </div>

      <!-- Transfer confirmation -->
      <div x-show="showTransferConfirm && transferTargetTableId" x-cloak
           style="margin-top: var(--space-3); padding: var(--space-3); background: #eff6ff; border: 1px solid #bfdbfe; border-radius: var(--radius-md);">
        <p style="font-size: var(--font-size-sm); font-weight: 500;">
          Chuyển từ <strong x-text="transferSourceTable?.name || ''"></strong>
          sang <strong x-text="getTableNameById(transferTargetTableId)"></strong>?
        </p>
      </div>

      <div class="modal-content__actions">
        <button class="btn btn--secondary"
                @click="showTransferTableModal = false; transferSourceTable = null;"
                :disabled="isTransferringTable">
          Hủy
        </button>
        <button class="btn btn--primary"
                @click="confirmTransferTable()"
                :disabled="isTransferringTable || !transferTargetTableId">
          <span x-show="!isTransferringTable">Chuyển bàn</span>
          <span x-show="isTransferringTable" x-cloak class="spinner spinner--sm"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- ================================================================
       S3-23: Reset Table Confirmation Modal (Paid -> Empty)
       ================================================================ -->
  <div class="modal-backdrop" x-show="showResetPanel" x-cloak
       @click.self="showResetPanel = false; resetTableTarget = null;">
    <div class="modal-content">
      <h3 class="modal-content__title">Dọn dẹp bàn</h3>
      <p>
        Xác nhận dọn dẹp bàn
        <strong x-text="resetTableTarget?.name || ''"></strong>?
      </p>
      <p style="margin-top: 8px; font-size: 0.875rem; color: var(--color-text-secondary);">
        Bàn sẽ chuyển về trạng thái trống và sẵn sàng cho khách mới.
      </p>
      <div class="modal-content__actions">
        <button class="btn btn--secondary"
                @click="showResetPanel = false; resetTableTarget = null;"
                :disabled="isResetting">
          Hủy
        </button>
        <button class="btn btn--primary"
                @click="confirmResetTable()"
                :disabled="isResetting">
          <span x-show="!isResetting">Dọn dẹp bàn</span>
          <span x-show="isResetting" x-cloak class="spinner spinner--sm"></span>
        </button>
      </div>
    </div>
  </div>

</section>
