<!-- Order list page template - loaded by router -->
<section x-data="orderListPage()" class="order-list-page">

  <!-- ================================================================
       Filter Bar
       ================================================================ -->
  <div class="filter-bar">

    <!-- Status filter -->
    <div class="form-group">
      <label class="form-label" for="filter-status">Trạng thái</label>
      <select id="filter-status" class="form-select" x-model="filterStatus" @change="applyFilters()">
        <option value="">Tất cả</option>
        <option value="active">Đang phục vụ</option>
        <option value="completed">Chờ thanh toán</option>
        <option value="finalized">Đã thanh toán</option>
        <option value="cancelled">Đã hủy</option>
      </select>
    </div>

    <!-- Date from -->
    <div class="form-group">
      <label class="form-label" for="filter-date-from">Từ ngày</label>
      <input id="filter-date-from" type="date" class="form-input"
             x-model="filterDateFrom" @change="applyFilters()">
    </div>

    <!-- Date to -->
    <div class="form-group">
      <label class="form-label" for="filter-date-to">Đến ngày</label>
      <input id="filter-date-to" type="date" class="form-input"
             x-model="filterDateTo" @change="applyFilters()">
    </div>

    <!-- Table filter -->
    <div class="form-group">
      <label class="form-label" for="filter-table">Bàn</label>
      <select id="filter-table" class="form-select" x-model="filterTableId" @change="applyFilters()">
        <option value="">Tất cả các bàn</option>
        <template x-for="table in tables" :key="table.id">
          <option :value="table.id" x-text="table.name"></option>
        </template>
      </select>
    </div>

    <!-- Clear filters button -->
    <button class="btn btn--outline btn--sm filter-bar__clear" @click="clearFilters()">
      Xóa bộ lọc
    </button>
  </div>

  <!-- ================================================================
       Loading State
       ================================================================ -->
  <div x-show="isLoading" x-cloak class="list-loading">
    <div class="spinner"></div>
    <p>Đang tải danh sách đơn hàng...</p>
  </div>

  <!-- ================================================================
       Empty State
       ================================================================ -->
  <div x-show="!isLoading && orders.length === 0" x-cloak class="list-empty">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
      <polyline points="13 2 13 9 20 9"></polyline>
    </svg>
    <p>Không tìm thấy đơn hàng nào</p>
  </div>

  <!-- ================================================================
       Desktop: Data Table
       ================================================================ -->
  <div x-show="!isLoading && orders.length > 0" x-cloak class="data-table-wrapper hide-mobile">
    <table class="data-table">
      <thead>
        <tr>
          <th>Mã đơn</th>
          <th>Bàn</th>
          <th>Trạng thái</th>
          <th>Số món</th>
          <th>Tổng tiền</th>
          <th>Thời gian</th>
          <th>Thao tác</th>
        </tr>
      </thead>
      <tbody>
        <template x-for="order in orders" :key="order.id">
          <tr>
            <td>
              <span class="order-code" x-text="truncateId(order.id)"></span>
            </td>
            <td x-text="tableName(order)"></td>
            <td>
              <span class="badge" :class="statusBadgeClass(order.status)"
                    x-text="statusLabel(order.status)"></span>
            </td>
            <td x-text="itemCount(order)"></td>
            <td x-text="formatVND(orderTotal(order)) + 'đ'"></td>
            <td x-text="formatDate(order.started_at)"></td>
            <td>
              <button class="btn btn--outline btn--sm" @click="viewOrder(order)">
                Xem
              </button>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>

  <!-- ================================================================
       Mobile: Card Layout
       ================================================================ -->
  <div x-show="!isLoading && orders.length > 0" x-cloak class="show-mobile-only">
    <template x-for="order in orders" :key="order.id">
      <div class="order-card" @click="viewOrder(order)">
        <div class="flex justify-between items-center mb-2">
          <span class="order-card__code" x-text="truncateId(order.id)"></span>
          <span class="badge" :class="statusBadgeClass(order.status)"
                x-text="statusLabel(order.status)"></span>
        </div>
        <div class="flex justify-between items-center">
          <span class="font-semibold" x-text="tableName(order)"></span>
          <span class="order-card__total"
                x-text="formatVND(orderTotal(order)) + 'đ'"></span>
        </div>
        <div class="flex justify-between mt-2 text-xs text-secondary">
          <span x-text="itemCount(order) + ' món'"></span>
          <span x-text="formatDateShort(order.started_at)"></span>
        </div>
      </div>
    </template>
  </div>

</section>
