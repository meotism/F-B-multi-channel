<!-- Order list page template - loaded by router -->
<section x-data="orderListPage()" style="padding: var(--space-4); max-width: 1200px; margin: 0 auto;">

  <!-- ================================================================
       Filter Bar
       ================================================================ -->
  <div style="display: flex; flex-wrap: wrap; gap: var(--space-3); align-items: flex-end; margin-bottom: var(--space-4);">

    <!-- Status filter -->
    <div class="form-group" style="margin-bottom: 0; min-width: 160px;">
      <label class="form-label" for="filter-status">Trạng thái</label>
      <select id="filter-status" class="form-select" x-model="filterStatus" @change="applyFilters()">
        <option value="">Tất cả</option>
        <option value="active">Đang phục vụ</option>
        <option value="completed">Chờ thanh toán</option>
        <option value="finalized">Đã thanh toán</option>
        <option value="cancelled">Đã hủy</option>
      </select>
    </div>

    <!-- Date from -->
    <div class="form-group" style="margin-bottom: 0; min-width: 160px;">
      <label class="form-label" for="filter-date-from">Từ ngày</label>
      <input id="filter-date-from" type="date" class="form-input"
             x-model="filterDateFrom" @change="applyFilters()">
    </div>

    <!-- Date to -->
    <div class="form-group" style="margin-bottom: 0; min-width: 160px;">
      <label class="form-label" for="filter-date-to">Đến ngày</label>
      <input id="filter-date-to" type="date" class="form-input"
             x-model="filterDateTo" @change="applyFilters()">
    </div>

    <!-- Table filter -->
    <div class="form-group" style="margin-bottom: 0; min-width: 160px;">
      <label class="form-label" for="filter-table">Bàn</label>
      <select id="filter-table" class="form-select" x-model="filterTableId" @change="applyFilters()">
        <option value="">Tất cả các bàn</option>
        <template x-for="table in tables" :key="table.id">
          <option :value="table.id" x-text="table.name"></option>
        </template>
      </select>
    </div>

    <!-- Clear filters button -->
    <button class="btn btn--outline btn--sm" @click="clearFilters()"
            style="height: 38px;">
      Xóa bộ lọc
    </button>
  </div>

  <!-- ================================================================
       Loading State
       ================================================================ -->
  <div x-show="isLoading" x-cloak style="text-align: center; padding: var(--space-6);">
    <div class="spinner"></div>
    <p style="margin-top: var(--space-3); color: var(--color-text-secondary);">Đang tải danh sách đơn hàng...</p>
  </div>

  <!-- ================================================================
       Empty State
       ================================================================ -->
  <div x-show="!isLoading && orders.length === 0" x-cloak
       style="text-align: center; padding: var(--space-8); color: var(--color-text-secondary);">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
         style="color: var(--color-text-secondary); margin-bottom: var(--space-3);">
      <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
      <polyline points="13 2 13 9 20 9"></polyline>
    </svg>
    <p>Không tìm thấy đơn hàng nào</p>
  </div>

  <!-- ================================================================
       Desktop: Data Table
       ================================================================ -->
  <div x-show="!isLoading && orders.length > 0" x-cloak class="data-table-wrapper hide-mobile">
    <table class="data-table">
      <thead>
        <tr>
          <th>Mã đơn</th>
          <th>Bàn</th>
          <th>Trạng thái</th>
          <th>Số món</th>
          <th>Tổng tiền</th>
          <th>Thời gian</th>
          <th>Thao tác</th>
        </tr>
      </thead>
      <tbody>
        <template x-for="order in orders" :key="order.id">
          <tr>
            <td>
              <span style="font-family: monospace; font-size: var(--font-size-xs);"
                    x-text="truncateId(order.id)"></span>
            </td>
            <td x-text="tableName(order)"></td>
            <td>
              <span class="badge" :class="statusBadgeClass(order.status)"
                    x-text="statusLabel(order.status)"></span>
            </td>
            <td x-text="itemCount(order)"></td>
            <td x-text="formatVND(orderTotal(order)) + 'đ'"></td>
            <td x-text="formatDate(order.started_at)"></td>
            <td>
              <button class="btn btn--outline btn--sm" @click="viewOrder(order)">
                Xem
              </button>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>

  <!-- ================================================================
       Mobile: Card Layout
       ================================================================ -->
  <div x-show="!isLoading && orders.length > 0" x-cloak class="show-mobile-only"
       style="display: flex; flex-direction: column; gap: var(--space-3);">
    <template x-for="order in orders" :key="order.id">
      <div style="background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-3); cursor: pointer;"
           @click="viewOrder(order)">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-2);">
          <span style="font-family: monospace; font-size: var(--font-size-xs); color: var(--color-text-secondary);"
                x-text="truncateId(order.id)"></span>
          <span class="badge" :class="statusBadgeClass(order.status)"
                x-text="statusLabel(order.status)"></span>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <span style="font-weight: 600;" x-text="tableName(order)"></span>
          <span style="font-weight: 700; color: var(--color-primary);"
                x-text="formatVND(orderTotal(order)) + 'đ'"></span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-top: var(--space-2); font-size: var(--font-size-xs); color: var(--color-text-secondary);">
          <span x-text="itemCount(order) + ' món'"></span>
          <span x-text="formatDateShort(order.started_at)"></span>
        </div>
      </div>
    </template>
  </div>

</section>
