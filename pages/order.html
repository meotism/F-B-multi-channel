<!-- Order page template - loaded by router -->
<section x-data="orderPage()" class="order-page">

  <!-- ================================================================
       Order Header — Back button + table info + mode indicator
       ================================================================ -->
  <div class="order-header">
    <button class="order-header__back" @click="goBack()">
      <!-- Left arrow icon -->
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      <span>Sơ đồ bàn</span>
    </button>
    <h2 class="order-header__title">
      <template x-if="mode === 'create'">
        <span>
          Đơn hàng: <span x-text="tableName"></span>
          <template x-if="tableLabel">
            <span>(<span x-text="tableLabel"></span>)</span>
          </template>
        </span>
      </template>
      <template x-if="mode === 'detail'">
        <span>
          Chi tiết đơn: <span x-text="tableName"></span>
          <template x-if="tableLabel">
            <span>(<span x-text="tableLabel"></span>)</span>
          </template>
        </span>
      </template>
    </h2>
  </div>

  <!-- ================================================================
       CREATE MODE — Menu browsing + cart (shown when creating a new order)
       ================================================================ -->
  <template x-if="mode === 'create'">
  <div>

  <!-- ================================================================
       Category Tabs — horizontal scrollable
       ================================================================ -->
  <div class="order-categories">
    <!-- "All" tab -->
    <button class="order-category-tab"
            :class="{ 'order-category-tab--active': $store.orders.selectedCategory === null }"
            @click="selectCategory(null)">
      Tất cả
    </button>
    <!-- One tab per category -->
    <template x-for="cat in $store.orders.categories" :key="cat.id">
      <button class="order-category-tab"
              :class="{ 'order-category-tab--active': $store.orders.selectedCategory === cat.id }"
              @click="selectCategory(cat.id)"
              x-text="cat.name">
      </button>
    </template>
  </div>

  <!-- ================================================================
       Order Body — Menu + Cart two-column (desktop) or stacked layout
       ================================================================ -->
  <div class="order-body">

    <!-- ============================================================
         Menu Section
         ============================================================ -->
    <div class="order-body__menu">

      <!-- Loading skeleton -->
      <div x-show="$store.orders.isLoading" x-cloak class="order-menu-skeleton">
        <template x-for="i in 8" :key="i">
          <div class="skeleton skeleton--rect" style="height: 100px;"></div>
        </template>
      </div>

      <!-- Empty state: no menu items at all -->
      <div x-show="!$store.orders.isLoading && $store.orders.menuItems.length === 0"
           x-cloak
           class="order-menu-empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
             style="color: var(--color-text-secondary); margin-bottom: var(--space-2);">
          <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"></path>
          <path d="M7 2v20"></path>
          <path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"></path>
        </svg>
        <p>Chưa có món ăn nào trong thực đơn</p>
      </div>

      <!-- Empty state: no items match the selected category -->
      <div x-show="!$store.orders.isLoading && $store.orders.menuItems.length > 0 && $store.orders.filteredMenuItems.length === 0"
           x-cloak
           class="order-menu-empty">
        <p>Không có món ăn trong danh mục này</p>
      </div>

      <!-- Menu items grid -->
      <div x-show="!$store.orders.isLoading && $store.orders.filteredMenuItems.length > 0"
           x-cloak
           class="order-menu-grid">
        <template x-for="item in $store.orders.filteredMenuItems" :key="item.id">
          <div class="order-menu-item"
               :class="{ 'order-menu-item--unavailable': item.is_available === false }"
               @click="item.is_available !== false && addToCart(item)">
            <span class="order-menu-item__name" x-text="item.name"></span>
            <!-- Task 11.2: Out-of-stock badge -->
            <span class="badge badge--danger"
                  x-show="item.is_available === false"
                  x-cloak
                  style="font-size: var(--font-size-xs);">
              Hết hàng
            </span>
            <span class="order-menu-item__price" x-text="formatVND(item.price) + 'đ'"></span>
            <button class="order-menu-item__add"
                    @click.stop="item.is_available !== false && addToCart(item)"
                    :disabled="item.is_available === false"
                    aria-label="Thêm vào đơn">
              +
            </button>
          </div>
        </template>
      </div>
    </div>

    <!-- ============================================================
         Cart Panel
         On desktop: sticky sidebar
         On tablet: bottom drawer (collapsed by default)
         On mobile: bottom sheet overlay (hidden by default)
         ============================================================ -->
    <div class="order-body__cart"
         :class="{
           'is-collapsed': !showCart,
           'is-hidden': !showCart
         }">
      <div class="order-cart">
        <!-- Drag handle for bottom sheet (tablet/mobile only) -->
        <div class="order-cart__drag-handle" @click="toggleCart()"></div>

        <!-- Cart header -->
        <div class="order-cart__header">
          <span class="order-cart__header-title">Giỏ hàng</span>
          <span class="order-cart__count"
                x-show="$store.orders.cart.length > 0"
                x-text="$store.orders.cart.length"
                x-cloak></span>
        </div>

        <!-- Cart items list -->
        <!-- Task 9.3: Re-attach swipe handlers when cart changes -->
        <div class="order-cart__items"
             x-effect="$store.orders.cart.length; attachCartSwipeHandlers()">
          <!-- Empty cart -->
          <div x-show="$store.orders.cart.length === 0"
               class="order-cart__empty">
            Chưa có món nào trong giỏ hàng
          </div>

          <!-- Cart item rows -->
          <template x-for="(item, index) in $store.orders.cart" :key="item.menuItemId">
            <div class="order-cart-item"
                 :class="{ 'cart-item--added': item.menuItemId === justAdded }"
                 :data-cart-index="index"
                 x-data="{ showNote: false }">
              <!-- Main row: name, qty controls, line total, actions -->
              <div class="order-cart-item__row">
                <span class="order-cart-item__name" x-text="item.name"></span>

                <!-- Quantity controls -->
                <div class="order-cart-item__qty">
                  <button class="order-cart-item__qty-btn"
                          @click="$store.orders.updateCartQty(index, item.qty - 1)"
                          aria-label="Giảm số lượng">
                    -
                  </button>
                  <span class="order-cart-item__qty-value" x-text="item.qty"></span>
                  <button class="order-cart-item__qty-btn"
                          @click="$store.orders.updateCartQty(index, item.qty + 1)"
                          aria-label="Tăng số lượng">
                    +
                  </button>
                </div>

                <!-- Line total -->
                <span class="order-cart-item__line-total"
                      x-text="formatVND(item.price * item.qty) + 'đ'"></span>

                <!-- Actions: note toggle + remove -->
                <div class="order-cart-item__actions">
                  <button class="order-cart-item__note-btn"
                          :class="{ 'order-cart-item__note-btn--active': showNote || item.note }"
                          @click="showNote = !showNote"
                          aria-label="Ghi chú">
                    Ghi chú
                  </button>
                  <button class="order-cart-item__remove"
                          @click="$store.orders.removeFromCart(index)"
                          aria-label="Xóa khỏi giỏ hàng">
                    &times;
                  </button>
                </div>
              </div>

              <!-- Note textarea (toggled) -->
              <textarea x-show="showNote"
                        x-cloak
                        class="order-cart-item__note"
                        x-model="item.note"
                        placeholder="Ghi chú cho món này..."
                        maxlength="1000"
                        @click.stop></textarea>
            </div>
          </template>
        </div>

        <!-- Task 9.1: Guest count input (create mode) -->
        <div class="order-cart__guest-count">
          <label class="order-cart__guest-label" for="guest-count-create">
            Số khách:
          </label>
          <input id="guest-count-create"
                 type="number"
                 class="order-cart__guest-input"
                 x-model.number="guestCount"
                 min="0"
                 max="99"
                 placeholder="0">
        </div>

        <!-- Cart total + confirm button -->
        <div class="order-cart-total">
          <div>
            <span class="order-cart-total__label">Tổng cộng: </span>
            <span class="order-cart-total__amount"
                  x-text="formatVND($store.orders.cartTotal) + 'đ'"></span>
          </div>
          <button class="btn btn--primary order-cart-total__confirm"
                  :disabled="$store.orders.cart.length === 0 || isSubmitting"
                  @click="confirmOrder()">
            <span x-show="!isSubmitting">Xác nhận đơn hàng</span>
            <span x-show="isSubmitting" x-cloak class="spinner spinner--sm"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ================================================================
       Cart backdrop overlay (mobile/tablet bottom sheet)
       ================================================================ -->
  <div class="order-cart-backdrop"
       :class="{ 'is-visible': showCart }"
       @click="closeCart()"></div>

  <!-- ================================================================
       Floating Cart Toggle Button (mobile/tablet only)
       ================================================================ -->
  <button class="order-cart-toggle"
          x-show="$store.orders.cart.length > 0"
          x-cloak
          @click="toggleCart()">
    <!-- Cart icon -->
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="21" r="1"></circle>
      <circle cx="20" cy="21" r="1"></circle>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
    </svg>
    <span x-text="formatVND($store.orders.cartTotal) + 'đ'"></span>
    <span class="order-cart-toggle__badge" x-text="$store.orders.cart.length"></span>
  </button>

  </div>
  </template>
  <!-- END CREATE MODE -->

  <!-- ================================================================
       DETAIL MODE — Shows the current order items with modification controls.
       Navigated to when tapping a table with status 'serving' or
       'awaiting_payment', or after creating a new order.
       Modification controls (qty [-]/[+], remove, note edit) are only
       shown when canModify is true (order status = 'active').

       Design reference: Section 4.3.5
       Requirements: 5.2 AC-4, 5.2 AC-6
       ================================================================ -->
  <template x-if="mode === 'detail'">
  <div class="order-detail"
       x-effect="checkForConflict()">

    <!-- Loading state -->
    <div x-show="$store.orders.isLoading" x-cloak class="order-detail__loading">
      <div class="spinner"></div>
      <p>Đang tải đơn hàng...</p>
    </div>

    <!-- Order items list -->
    <div x-show="!$store.orders.isLoading" class="order-detail__content">

      <!-- Order info summary -->
      <div class="order-detail__summary">
        <span class="order-detail__status badge badge--success"
              x-show="$store.orders.currentOrder?.status === 'active'">
          Đang phục vụ
        </span>
        <span class="order-detail__status badge badge--warning"
              x-show="$store.orders.currentOrder?.status === 'completed'"
              x-cloak>
          Chờ thanh toán
        </span>
        <span class="order-detail__status badge badge--info"
              x-show="$store.orders.currentOrder?.status === 'finalized'"
              x-cloak>
          Đã hoàn tất
        </span>
        <span class="order-detail__item-count"
              x-text="$store.orders.itemCount + ' món'"></span>
      </div>

      <!-- Empty state: no items in order -->
      <div x-show="$store.orders.orderItems.length === 0"
           x-cloak
           class="order-detail__empty">
        <p>Đơn hàng chưa có món nào</p>
      </div>

      <!-- Order item rows with inline modification controls -->
      <div class="order-detail__items">
        <template x-for="item in $store.orders.orderItems" :key="item.id">
          <div class="order-detail-item"
               x-data="{ showNote: !!item.note }"
               :class="{ 'order-detail-item--saving': isSavingItem === item.id }">

            <div class="order-detail-item__row">
              <!-- Item name -->
              <span class="order-detail-item__name"
                    x-text="item.menuItemName || item.menu_items?.name || ''"></span>

              <!-- Qty controls: shown when canModify, otherwise static qty -->
              <template x-if="canModify">
                <div class="order-detail-item__qty-controls">
                  <button class="order-detail-item__qty-btn"
                          :disabled="isSavingItem === item.id"
                          @click="changeQty(item.id, item.qty - 1)"
                          aria-label="Giảm số lượng">
                    -
                  </button>
                  <span class="order-detail-item__qty-value" x-text="item.qty"></span>
                  <button class="order-detail-item__qty-btn"
                          :disabled="isSavingItem === item.id"
                          @click="changeQty(item.id, item.qty + 1)"
                          aria-label="Tăng số lượng">
                    +
                  </button>
                </div>
              </template>
              <template x-if="!canModify">
                <span class="order-detail-item__qty" x-text="'x' + item.qty"></span>
              </template>

              <!-- Line price -->
              <span class="order-detail-item__price"
                    x-text="formatVND(item.price * item.qty) + 'đ'"></span>

              <!-- Actions: note toggle + remove (only when canModify) -->
              <template x-if="canModify">
                <div class="order-detail-item__actions">
                  <button class="order-detail-item__note-btn"
                          :class="{ 'order-detail-item__note-btn--active': showNote || item.note }"
                          @click="showNote = !showNote"
                          aria-label="Ghi chú">
                    <!-- Pencil icon for note -->
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                  </button>
                  <button class="order-detail-item__remove"
                          :disabled="isSavingItem === item.id"
                          @click="removeOrderItem(item.id)"
                          aria-label="Xóa món">
                    &times;
                  </button>
                </div>
              </template>
            </div>

            <!-- Note textarea (expandable, editable when canModify) -->
            <template x-if="canModify">
              <textarea x-show="showNote"
                        x-cloak
                        class="order-detail-item__note-input"
                        :value="item.note || ''"
                        placeholder="Ghi chú cho món này..."
                        maxlength="1000"
                        :disabled="savingNote === item.id"
                        @blur="saveNote(item.id, $event.target.value)"
                        @click.stop></textarea>
            </template>
            <!-- Read-only note display (when not canModify) -->
            <template x-if="!canModify">
              <div x-show="item.note" x-cloak class="order-detail-item__note">
                <span x-text="item.note"></span>
              </div>
            </template>
          </div>
        </template>
      </div>

      <!-- Task 9.1: Order-level note (detail mode, above total) -->
      <div class="order-detail__note-section">
        <label class="order-detail__note-label" for="order-note">Ghi chú đơn hàng:</label>
        <textarea id="order-note"
                  class="order-note"
                  x-model="orderNote"
                  placeholder="Ghi chú cho đơn hàng..."
                  maxlength="2000"
                  :disabled="!canModify"
                  @blur="saveOrderNote()"></textarea>
      </div>

      <!-- Task 9.1: Guest count (detail mode) -->
      <div class="order-detail__guest-section">
        <label class="order-detail__guest-label" for="guest-count-detail">Số khách:</label>
        <input id="guest-count-detail"
               type="number"
               class="order-detail__guest-input"
               x-model.number="guestCount"
               min="0"
               max="99"
               :disabled="!canModify"
               @blur="saveGuestCount()">
      </div>

      <!-- Task 17.2: Applied discount badge -->
      <div x-show="appliedDiscount" x-cloak
           style="display: flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-3); background: #dcfce7; border: 1px solid #bbf7d0; border-radius: var(--radius-md);">
        <span class="badge badge--success" style="font-size: var(--font-size-xs);">KM</span>
        <span style="font-size: var(--font-size-sm); font-weight: 500;"
              x-text="appliedDiscount?.name || ''"></span>
        <span style="font-size: var(--font-size-sm); color: var(--color-text-secondary);"
              x-text="'(-' + formatDiscountValue(appliedDiscount) + ')'"></span>
        <span style="font-size: var(--font-size-sm); font-weight: 600; color: #166534;"
              x-text="'-' + formatVND(discountAmount) + 'đ'"></span>
        <button class="btn btn--outline btn--sm"
                x-show="canModify"
                @click="clearDiscount()"
                style="margin-left: auto; font-size: var(--font-size-xs); padding: 2px 8px; min-height: 28px;">
          Xóa
        </button>
      </div>

      <!-- Order total -->
      <div class="order-detail__total">
        <span class="order-detail__total-label">Tổng cộng:</span>
        <span class="order-detail__total-amount"
              x-show="!appliedDiscount"
              x-text="formatVND($store.orders.orderTotal) + 'đ'"></span>
        <span x-show="appliedDiscount" x-cloak style="display: flex; flex-direction: column; align-items: flex-end;">
          <span style="font-size: var(--font-size-sm); color: var(--color-text-secondary); text-decoration: line-through;"
                x-text="formatVND($store.orders.orderTotal) + 'đ'"></span>
          <span class="order-detail__total-amount"
                x-text="formatVND(finalTotal) + 'đ'"></span>
        </span>
      </div>

      <!-- Action buttons section (visible when order is active / canModify) -->
      <div class="order-detail__actions" x-show="canModify">
        <!-- "Them mon" (Add items) toggle button -->
        <button class="btn order-detail__add-items-btn"
                :class="{ 'btn--primary': !isAddingItems, 'btn--secondary': isAddingItems }"
                @click="toggleAddItems()">
          <template x-if="!isAddingItems">
            <span>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                   style="vertical-align: -2px; margin-right: 4px;">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              Thêm món
            </span>
          </template>
          <template x-if="isAddingItems">
            <span>Đóng thực đơn</span>
          </template>
        </button>

        <!-- S3-09: Request Payment button -->
        <button class="btn btn--warning"
                @click="requestPayment()"
                :disabled="isRequestingPayment">
          <span x-show="!isRequestingPayment">Yêu cầu thanh toán</span>
          <span x-show="isRequestingPayment" x-cloak class="spinner spinner--sm"></span>
        </button>

        <!-- S3-11: Cancel Order button (manager/cashier/owner only) -->
        <button class="btn btn--danger"
                x-show="$store.auth.hasPermission('cancel_order')"
                @click="showCancelConfirm = true">
          Hủy đơn hàng
        </button>

        <!-- S3-13: Transfer Order button -->
        <button class="btn btn--secondary"
                x-show="$store.auth.hasPermission('transfer_order')"
                @click="openTransferModal()">
          Chuyển bàn
        </button>

        <!-- S3-15: Merge Orders button -->
        <button class="btn btn--secondary"
                x-show="$store.auth.hasPermission('merge_orders')"
                @click="openMergeModal()">
          Gộp đơn
        </button>

        <!-- Task 17.2: Discount button -->
        <button class="btn btn--secondary"
                @click="openDiscountModal()">
          Khuyến mãi
        </button>
      </div>

      <!-- S3-09: Cancel Payment Request (visible when order status is 'completed' / awaiting payment) -->
      <div class="order-detail__actions" x-show="$store.orders.currentOrder?.status === 'completed'">
        <div class="order-detail__locked-notice">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               style="vertical-align: -2px; margin-right: 4px;">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          Đơn hàng đang chờ thanh toán — không thể chỉnh sửa
        </div>
        <!-- Navigate to bill page to finalize payment -->
        <button class="btn btn--primary"
                x-show="$store.auth.hasPermission('finalize_bill')"
                x-cloak
                @click="goToBill()">
          Xuất hóa đơn
        </button>
        <button class="btn btn--secondary"
                @click="cancelPaymentRequest()"
                :disabled="isRequestingPayment">
          <span x-show="!isRequestingPayment">Hủy yêu cầu thanh toán</span>
          <span x-show="isRequestingPayment" x-cloak class="spinner spinner--sm"></span>
        </button>
      </div>

      <!-- Edit lock notice (visible when order is finalized — Requirement 3 AC-3) -->
      <div class="order-detail__actions" x-show="$store.orders.currentOrder?.status === 'finalized'" x-cloak>
        <div class="order-detail__locked-notice">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               style="vertical-align: -2px; margin-right: 4px;">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          Đơn hàng đã khóa, không thể chỉnh sửa
        </div>
      </div>

      <!-- ============================================================
           Add Items Menu Browser — shown when isAddingItems is true.
           Reuses the same category tabs + menu grid layout from create mode,
           but tapping a menu item calls addItemDirectly() instead of addToCart().
           ============================================================ -->
      <template x-if="isAddingItems && canModify">
        <div class="order-detail__menu-browser">

          <!-- Category tabs -->
          <div class="order-categories">
            <button class="order-category-tab"
                    :class="{ 'order-category-tab--active': $store.orders.selectedCategory === null }"
                    @click="selectCategory(null)">
              Tất cả
            </button>
            <template x-for="cat in $store.orders.categories" :key="cat.id">
              <button class="order-category-tab"
                      :class="{ 'order-category-tab--active': $store.orders.selectedCategory === cat.id }"
                      @click="selectCategory(cat.id)"
                      x-text="cat.name">
              </button>
            </template>
          </div>

          <!-- Loading skeleton -->
          <div x-show="$store.orders.isLoading" x-cloak class="order-menu-skeleton">
            <template x-for="i in 6" :key="i">
              <div class="skeleton skeleton--rect" style="height: 100px;"></div>
            </template>
          </div>

          <!-- Menu items grid -->
          <div x-show="!$store.orders.isLoading && $store.orders.filteredMenuItems.length > 0"
               x-cloak
               class="order-menu-grid">
            <template x-for="menuItem in $store.orders.filteredMenuItems" :key="menuItem.id">
              <div class="order-menu-item"
                   :class="{ 'order-menu-item--adding': isSavingItem === 'adding', 'order-menu-item--unavailable': menuItem.is_available === false }"
                   @click="menuItem.is_available !== false && addItemDirectly(menuItem)">
                <span class="order-menu-item__name" x-text="menuItem.name"></span>
                <!-- Task 11.2: Out-of-stock badge -->
                <span class="badge badge--danger"
                      x-show="menuItem.is_available === false"
                      x-cloak
                      style="font-size: var(--font-size-xs);">
                  Hết hàng
                </span>
                <span class="order-menu-item__price" x-text="formatVND(menuItem.price) + 'đ'"></span>
                <button class="order-menu-item__add"
                        @click.stop="menuItem.is_available !== false && addItemDirectly(menuItem)"
                        :disabled="menuItem.is_available === false"
                        aria-label="Thêm vào đơn">
                  +
                </button>
              </div>
            </template>
          </div>

          <!-- Empty state: no items match -->
          <div x-show="!$store.orders.isLoading && $store.orders.filteredMenuItems.length === 0"
               x-cloak
               class="order-menu-empty">
            <p>Không có món ăn trong danh mục này</p>
          </div>
        </div>
      </template>

    </div>
  </div>
  </template>
  <!-- END DETAIL MODE -->

  <!-- ================================================================
       MODALS — Cancel, Transfer, Merge confirmation dialogs
       ================================================================ -->

  <!-- S3-11 + Task 9.5: Cancel Order Confirmation Modal with reason -->
  <div class="modal-backdrop" x-show="showCancelConfirm" x-cloak
       @click.self="showCancelConfirm = false">
    <div class="modal-content">
      <h3 class="modal-content__title">Hủy đơn hàng</h3>
      <p>Bạn có chắc muốn hủy đơn hàng này? Tồn kho sẽ được hoàn trả.</p>

      <!-- Task 9.5: Cancellation reason (manager/owner only) -->
      <template x-if="isManagerOrOwner">
        <div class="modal-cancel-reason">
          <label class="modal-cancel-reason__label" for="cancel-reason">
            Lý do hủy <span class="modal-cancel-reason__required">*</span>
          </label>
          <textarea id="cancel-reason"
                    class="modal-cancel-reason__input"
                    x-model="cancelReason"
                    placeholder="Nhập lý do hủy đơn hàng..."
                    maxlength="500"
                    rows="3"></textarea>
        </div>
      </template>

      <div class="modal-content__actions">
        <button class="btn btn--secondary"
                @click="showCancelConfirm = false; cancelReason = ''"
                :disabled="isCancelling">
          Không
        </button>
        <button class="btn btn--danger"
                @click="cancelOrder()"
                :disabled="isCancelling || (isManagerOrOwner && !cancelReason.trim())">
          <span x-show="!isCancelling">Xác nhận hủy</span>
          <span x-show="isCancelling" x-cloak class="spinner spinner--sm"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- S3-13: Transfer Order Modal -->
  <div class="modal-backdrop" x-show="showTransferModal" x-cloak
       @click.self="showTransferModal = false">
    <div class="modal-content">
      <h3 class="modal-content__title">Chuyển bàn</h3>
      <template x-if="emptyTables.length === 0">
        <p>Không có bàn trống nào.</p>
      </template>
      <template x-if="emptyTables.length > 0">
        <div>
          <p style="margin-bottom: 12px;">Chọn bàn trống để chuyển đơn hàng:</p>
          <div class="modal-table-grid">
            <template x-for="t in emptyTables" :key="t.id">
              <button class="modal-table-card"
                      :class="{ 'modal-table-card--selected': selectedTransferTarget === t.id }"
                      @click="selectedTransferTarget = t.id">
                <span class="modal-table-card__name" x-text="t.name"></span>
                <template x-if="t.label">
                  <span class="modal-table-card__label" x-text="t.label"></span>
                </template>
              </button>
            </template>
          </div>
        </div>
      </template>
      <div class="modal-content__actions">
        <button class="btn btn--secondary"
                @click="showTransferModal = false"
                :disabled="isTransferring">
          Hủy
        </button>
        <button class="btn btn--primary"
                @click="confirmTransfer()"
                :disabled="isTransferring || !selectedTransferTarget">
          <span x-show="!isTransferring">Chuyển bàn</span>
          <span x-show="isTransferring" x-cloak class="spinner spinner--sm"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- Task 17.2: Discount Picker Modal -->
  <div class="modal-backdrop" x-show="showDiscountModal" x-cloak
       @click.self="showDiscountModal = false">
    <div class="modal-content">
      <h3 class="modal-content__title">Chọn khuyến mãi</h3>

      <!-- Loading state -->
      <div x-show="isLoadingDiscounts" x-cloak style="padding: var(--space-4); text-align: center;">
        <div class="spinner"></div>
        <p style="margin-top: var(--space-2); font-size: var(--font-size-sm); color: var(--color-text-secondary);">
          Đang tải khuyến mãi...
        </p>
      </div>

      <!-- Empty state -->
      <div x-show="!isLoadingDiscounts && availableDiscounts.length === 0" x-cloak
           style="padding: var(--space-4); text-align: center; color: var(--color-text-secondary); font-size: var(--font-size-sm);">
        <p>Không có khuyến mãi nào đang hoạt động.</p>
      </div>

      <!-- Discount list -->
      <div x-show="!isLoadingDiscounts && availableDiscounts.length > 0" x-cloak
           style="max-height: 400px; overflow-y: auto;">
        <template x-for="disc in availableDiscounts" :key="disc.id">
          <div style="display: flex; align-items: center; justify-content: space-between; padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--color-border); cursor: pointer; transition: background 0.15s;"
               :style="appliedDiscount?.id === disc.id ? 'background: rgba(22,163,74,0.08);' : ''"
               @click="selectDiscount(disc)">
            <div>
              <div style="font-weight: 600; font-size: var(--font-size-sm);" x-text="disc.name"></div>
              <div style="font-size: var(--font-size-xs); color: var(--color-text-secondary);">
                <span x-text="disc.type === 'percent' ? ('Giảm ' + disc.value + '%') : ('Giảm ' + formatVND(disc.value) + 'đ')"></span>
                <span x-text="disc.scope === 'order' ? ' (toàn đơn)' : ' (theo món)'"></span>
              </div>
            </div>
            <span x-show="appliedDiscount?.id === disc.id" x-cloak
                  style="color: var(--color-success); font-weight: 700; font-size: var(--font-size-sm);">
              &#10003; Đang áp dụng
            </span>
          </div>
        </template>
      </div>

      <div class="modal-content__actions">
        <button class="btn btn--secondary"
                @click="showDiscountModal = false">
          Đóng
        </button>
      </div>
    </div>
  </div>

  <!-- S3-15: Merge Orders Modal -->
  <div class="modal-backdrop" x-show="showMergeModal" x-cloak
       @click.self="showMergeModal = false">
    <div class="modal-content">
      <h3 class="modal-content__title">Gộp đơn hàng</h3>
      <template x-if="mergeCandidates.length === 0">
        <p>Không có bàn nào đang phục vụ để gộp.</p>
      </template>
      <template x-if="mergeCandidates.length > 0">
        <div>
          <p style="margin-bottom: 12px;">Chọn bàn để gộp vào đơn hàng hiện tại:</p>
          <div class="modal-table-grid">
            <template x-for="c in mergeCandidates" :key="c.orderId">
              <button class="modal-table-card"
                      :class="{ 'modal-table-card--selected': selectedMergeSources.includes(c.orderId) }"
                      @click="toggleMergeSource(c.orderId)">
                <span class="modal-table-card__name" x-text="c.tableName"></span>
                <template x-if="c.tableLabel">
                  <span class="modal-table-card__label" x-text="c.tableLabel"></span>
                </template>
                <span class="modal-table-card__check"
                      x-show="selectedMergeSources.includes(c.orderId)">&#10003;</span>
              </button>
            </template>
          </div>
        </div>
      </template>
      <div class="modal-content__actions">
        <button class="btn btn--secondary"
                @click="showMergeModal = false"
                :disabled="isMerging">
          Hủy
        </button>
        <button class="btn btn--primary"
                @click="confirmMerge()"
                :disabled="isMerging || selectedMergeSources.length === 0">
          <span x-show="!isMerging">Gộp đơn (<span x-text="selectedMergeSources.length"></span>)</span>
          <span x-show="isMerging" x-cloak class="spinner spinner--sm"></span>
        </button>
      </div>
    </div>
  </div>

</section>
