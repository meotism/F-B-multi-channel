<!-- Login page template - loaded by router -->
<section class="login-page" x-data="loginPage()">
  <div class="login-card">
    <!-- App logo and title -->
    <div class="login-card__header">
      <svg class="login-card__logo" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 3h18v18H3z"></path>
        <path d="M12 8v8"></path>
        <path d="M8 12h8"></path>
      </svg>
      <h1 class="login-card__title">F&B Management</h1>
      <p class="login-card__subtitle">Quản lý nhà hàng</p>
    </div>

    <!-- Error message -->
    <div class="login-card__error" x-show="error" x-cloak>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="15" y1="9" x2="9" y2="15"></line>
        <line x1="9" y1="9" x2="15" y2="15"></line>
      </svg>
      <span x-text="error"></span>
    </div>

    <!-- Login form -->
    <form @submit.prevent="login()" class="login-card__form">
      <div class="form-group">
        <label class="form-label" for="login-email">Email</label>
        <input id="login-email"
               type="email"
               class="form-input"
               x-model="email"
               placeholder="name@example.com"
               autocomplete="email"
               required
               :disabled="isLoading">
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">Mật khẩu</label>
        <div class="form-input-group">
          <input id="login-password"
                 :type="showPassword ? 'text' : 'password'"
                 class="form-input"
                 x-model="password"
                 placeholder="Nhập mật khẩu"
                 autocomplete="current-password"
                 required
                 :disabled="isLoading">
          <button type="button"
                  class="form-input-group__toggle"
                  @click="showPassword = !showPassword"
                  :aria-label="showPassword ? 'Ẩn mật khẩu' : 'Hiện mật khẩu'"
                  :aria-pressed="showPassword"
                  :disabled="isLoading"
                  tabindex="-1">
            <!-- Eye icon (password hidden, click to show) -->
            <svg x-show="!showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <!-- Eye-off icon (password visible, click to hide) -->
            <svg x-show="showPassword" x-cloak width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit"
              class="btn btn--primary btn--block btn--lg"
              :disabled="isLoading">
        <!-- Loading spinner -->
        <span x-show="isLoading" class="spinner spinner--sm" style="color: white;" x-cloak></span>
        <!-- Button text -->
        <span x-text="isLoading ? 'Đang đăng nhập...' : 'Đăng nhập'"></span>
      </button>
    </form>
  </div>
</section>
